<div class="p-6 min-w-[300px]">
  <h2 class="text-xl font-display font-semibold mb-4 text-text">{{ data.title }}</h2>
  <p class="text-text-muted mb-6">{{ data.message }}</p>
  
  <div class="flex justify-end gap-3">
    <button class="px-4 py-2 text-text-muted hover:text-text font-medium transition-colors" (click)="onCancel()">Cancel</button>
    <button class="px-4 py-2 bg-error text-white rounded-md font-medium shadow-sm hover:bg-red-600 transition-colors" (click)="onConfirm()">Confirm</button>
  </div>
</div>
