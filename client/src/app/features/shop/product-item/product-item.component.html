@if (product) {
<mat-card appearance="raised" routerLink="/shop/{{product.id}}" class="product-card">
    <img src="{{product.imageUrl | backendImage}}" class="rounded-t-lg" alt="image of {{product.name}}">
    <mat-card-content class="mt-2">
      <h2 class="text-sm font-semibold uppercase">{{product.name}}</h2>
      <p class="font-light">{{product.price | currency}}</p>
    </mat-card-content>
    <mat-card-actions (click)="$event.stopPropagation()">
      <button mat-stroked-button class="w-full" [class.added]="isAdded" (click)="addToCart()" [disabled]="isAdded">
        @if (isAdded) {
          <mat-icon class="pop-in">check_circle</mat-icon>
          <span class="pop-in">Added to Cart</span>
        } @else {
          <mat-icon>add_shopping_cart</mat-icon>
          <span>Add to cart</span>
        }
      </button>
    </mat-card-actions>
</mat-card>
}
