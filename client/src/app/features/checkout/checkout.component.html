<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 mt-16">
    <div class="mb-8">
        <h1 class="text-3xl font-bold tracking-tight text-gray-900">Checkout</h1>
        <p class="mt-2 text-sm text-gray-500">Please complete your payment and shipping details below.</p>
    </div>

    <div class="flex flex-col lg:flex-row gap-8">
        <!-- Left Column: Stepper -->
        <div class="w-full lg:w-2/3">
            <mat-stepper (selectionChange)="onStepChange($event)" [linear]="true" #stepper
                class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                
                <!-- Step 1: Address -->
                <mat-step label="Address" [completed]="completionStatus().address">
                    <div class="p-4 sm:p-6">
                        <div id="address-element" class="mb-6"></div>
                        <div class="flex items-center mb-6 px-1">
                            <mat-checkbox (change)="onSaveAddressCheckboxChange($event)"
                                [checked]="saveAddress"
                                color="primary"
                                class="text-sm font-medium text-gray-700">
                                Save this address to my profile
                            </mat-checkbox>
                        </div>
                        <div class="flex justify-between items-center mt-8 pt-6 border-t border-gray-100">
                            <button routerLink="/shop"
                                class="text-sm font-semibold text-gray-600 hover:text-gray-900 transition-colors">
                                &larr; Continue shopping
                            </button>
                            <button [disabled]="!completionStatus().address" matStepperNext
                                class="rounded-full bg-black px-8 py-3 text-sm font-semibold text-white shadow-sm hover:bg-gray-800 disabled:bg-gray-300 disabled:cursor-not-allowed transition-all">
                                Continue to Shipping
                            </button>
                        </div>
                    </div>
                </mat-step>

                <!-- Step 2: Shipping -->
                <mat-step label="Shipping" [completed]="completionStatus().delivery">
                    <div class="p-4 sm:p-6">
                        <app-checkout-delivery (deliveryComplete)="handleDeliveryChange($event)"></app-checkout-delivery>
                        <div class="flex justify-between items-center mt-8 pt-6 border-t border-gray-100">
                            <button matStepperPrevious
                                class="text-sm font-semibold text-gray-600 hover:text-gray-900 transition-colors">
                                &larr; Back to Address
                            </button>
                            <button [disabled]="!completionStatus().delivery" matStepperNext
                                class="rounded-full bg-black px-8 py-3 text-sm font-semibold text-white shadow-sm hover:bg-gray-800 disabled:bg-gray-300 disabled:cursor-not-allowed transition-all">
                                Continue to Payment
                            </button>
                        </div>
                    </div>
                </mat-step>

                <!-- Step 3: Payment -->
                <mat-step label="Payment" [completed]="completionStatus().card">
                    <div class="p-4 sm:p-6">
                        <div id="payment-element" class="mb-6"></div>
                        <div class="flex justify-between items-center mt-8 pt-6 border-t border-gray-100">
                            <button matStepperPrevious
                                class="text-sm font-semibold text-gray-600 hover:text-gray-900 transition-colors">
                                &larr; Back to Shipping
                            </button>
                            <button [disabled]="!completionStatus().card" matStepperNext
                                class="rounded-full bg-black px-8 py-3 text-sm font-semibold text-white shadow-sm hover:bg-gray-800 disabled:bg-gray-300 disabled:cursor-not-allowed transition-all">
                                Review Order
                            </button>
                        </div>
                    </div>
                </mat-step>

                <!-- Step 4: Confirmation / Review -->
                <mat-step label="Review">
                    <div class="p-4 sm:p-6">
                        <app-checkout-review [confirmationToken]="confirmationToken"></app-checkout-review>
                        <div class="flex justify-between items-center mt-8 pt-6 border-t border-gray-100">
                            <button matStepperPrevious
                                class="text-sm font-semibold text-gray-600 hover:text-gray-900 transition-colors">
                                &larr; Back to Payment
                            </button>
                            <button [disabled]="!confirmationToken || loading" (click)="confirmPayment(stepper)"
                                class="flex items-center justify-center rounded-full bg-black px-10 py-3 text-sm font-semibold text-white shadow-sm hover:bg-gray-800 disabled:bg-gray-300 disabled:cursor-not-allowed transition-all min-w-[200px]">
                                @if (loading) {
                                    <mat-spinner diameter="20" color="accent"></mat-spinner>
                                } @else {
                                    <span>Pay {{cartService.totals()?.total | currency}}</span>
                                }
                            </button>
                        </div>
                    </div>
                </mat-step>

            </mat-stepper>
        </div>

        <!-- Right Column: Order Summary -->
        <div class="w-full lg:w-1/3">
            <div class="sticky top-24">
                <app-order-summary></app-order-summary>
            </div>
        </div>
    </div>
</div>
