<div class="w-full">
    <mat-radio-group 
        [value]="cartService.selectedDelivery()?.id" 
        (change)="updateDeliveryMethod($event.value)"
        class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        @for (method of checkoutService.deliveryMethods; track method.id) {
        <label
            class="relative flex cursor-pointer rounded-xl border p-4 shadow-sm focus:outline-none transition-all duration-300"
            [class.border-black]="cartService.selectedDelivery()?.id === method.id"
            [class.ring-1]="cartService.selectedDelivery()?.id === method.id"
            [class.ring-black]="cartService.selectedDelivery()?.id === method.id"
            [class.bg-gray-50]="cartService.selectedDelivery()?.id === method.id"
            [class.border-gray-200]="cartService.selectedDelivery()?.id !== method.id"
            [class.hover:border-gray-300]="cartService.selectedDelivery()?.id !== method.id"
            [class.hover:bg-gray-50]="cartService.selectedDelivery()?.id !== method.id">
            
            <mat-radio-button 
                [value]="method" 
                [checked]="cartService.selectedDelivery()?.id === method.id"
                class="sr-only">
            </mat-radio-button>

            <span class="flex flex-1">
                <span class="flex flex-col w-full">
                    <span class="flex items-center justify-between w-full">
                        <span class="text-sm font-semibold text-gray-900">{{ method.shortName }}</span>
                        <span class="text-sm font-semibold text-gray-900">{{ method.price | currency }}</span>
                    </span>
                    <span class="mt-1 flex items-center text-sm text-gray-500">{{ method.description }}</span>
                    <span class="mt-4 text-xs font-medium text-gray-400">Estimated delivery: {{ method.deliveryTime }}</span>
                </span>
            </span>
            
            <!-- Active Indicator Checkmark -->
            @if (cartService.selectedDelivery()?.id === method.id) {
            <svg class="h-5 w-5 text-black absolute top-4 right-4" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.857-9.809a.75.75 0 00-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 10-1.06 1.061l2.5 2.5a.75.75 0 001.137-.089l4-5.5z" clip-rule="evenodd" />
            </svg>
            }
        </label>
        }
    </mat-radio-group>
</div>
