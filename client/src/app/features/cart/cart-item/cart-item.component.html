<div class="flex w-full">
    <!-- Image -->
    <div class="shrink-0 relative rounded-md overflow-hidden bg-gray-100 sm:w-32 sm:h-40 w-24 h-32 border border-gray-100">
        <a routerLink="/shop/{{item().productId}}">
            <img class="h-full w-full object-cover object-center hover:scale-105 transition-transform duration-500" 
                 src="{{item().pictureUrl | backendImage}}" 
                 alt="{{item().productName}}">
        </a>
    </div>

    <!-- Product Details -->
    <div class="ml-4 sm:ml-6 flex flex-1 flex-col justify-between">
        <div class="relative pr-9 sm:grid sm:grid-cols-2 sm:gap-x-6 sm:pr-0">
            <!-- Title and Type -->
            <div>
                <div class="flex justify-between">
                    <h3 class="text-base sm:text-lg font-medium text-gray-900 hover:text-gray-600 transition-colors">
                        <a routerLink="/shop/{{item().productId}}">{{item().productName}}</a>
                    </h3>
                </div>
                <div class="mt-1 flex text-sm">
                    <p class="text-gray-500 capitalize">{{item().type}}</p>
                    <p class="ml-4 border-l border-gray-200 pl-4 text-gray-500 capitalize">{{item().brand}}</p>
                </div>
                <p class="mt-2 text-lg font-semibold text-gray-900">{{item().price | currency}}</p>
            </div>

            <!-- Quantity & Actions -->
            <div class="mt-4 sm:mt-0 flex items-center sm:justify-end gap-6">
                <!-- Quantity Selector -->
                <div class="flex items-center border border-gray-300 rounded-full bg-white px-2 py-1 shadow-sm">
                    <button type="button" 
                            (click)="decrementQuantity()"
                            class="text-gray-500 hover:text-black focus:outline-none transition-colors w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100">
                        <mat-icon class="text-[20px] w-[20px] h-[20px]">remove</mat-icon>
                    </button>
                    
                    <span class="text-gray-900 font-semibold w-8 text-center text-sm">
                        {{item().quantity}}
                    </span>
                    
                    <button type="button" 
                            (click)="incrementQuantity()"
                            class="text-gray-500 hover:text-black focus:outline-none transition-colors w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100">
                        <mat-icon class="text-[20px] w-[20px] h-[20px]">add</mat-icon>
                    </button>
                </div>

                <!-- Remove Button -->
                <button type="button" 
                        (click)="removeItemFromCart()" 
                        class="text-gray-400 hover:text-red-600 transition-colors flex items-center justify-center p-2 rounded-full hover:bg-red-50"
                        matTooltip="Remove item">
                    <mat-icon class="text-[22px] w-[22px] h-[22px]">delete_outline</mat-icon>
                </button>
            </div>
        </div>
    </div>
</div>
