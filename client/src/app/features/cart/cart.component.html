<section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 mt-16">
  @if (cartService.cart()?.items?.length! > 0) {
    <div class="mb-8">
      <h1 class="text-3xl font-extrabold tracking-tight text-gray-900">Shopping Cart</h1>
    </div>

    <div class="flex flex-col lg:flex-row w-full items-start gap-12">
      <div class="w-full lg:w-2/3 xl:w-3/4">
        <ul role="list" class="divide-y divide-gray-200 border-t border-b border-gray-200">
          @for (item of cartService.cart()?.items; track item.productId) {
            <li class="py-6 sm:py-8">
              <app-cart-item [item]="item"></app-cart-item>
            </li>
          }
        </ul>
      </div>
      <div class="w-full lg:w-1/3 xl:w-1/4 lg:sticky lg:top-32">
        <app-order-summary></app-order-summary>
      </div>
    </div>
  } @else {
    <app-empty-state 
      message="Your shopping cart is empty"
      icon="remove_shopping_cart"
      actionText="Go to shop"
      (action)="onAction()"
    />
  }
</section>
