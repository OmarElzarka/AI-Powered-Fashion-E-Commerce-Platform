<div class="admin-container bg-bg">
  
  <!-- Sidebar -->
  <aside class="admin-sidebar bg-primary text-white flex flex-col shadow-xl z-20 hidden md:flex">
    <div class="sidebar-header p-6 border-b border-gray-800 flex items-center gap-3">
      <mat-icon class="gold-accent text-3xl">admin_panel_settings</mat-icon>
      <h2 class="text-xl font-display font-semibold tracking-wide m-0">STYLÉ Admin</h2>
    </div>

    <nav class="flex-1 py-6 px-4 flex flex-col gap-2">
      @for (item of navItems; track item.path) {
        <a [routerLink]="item.path" 
           routerLinkActive="active-nav bg-gray-800 gold-accent border-l-4 border-secondary shadow-md"
           [routerLinkActiveOptions]="{exact: true}"
           class="nav-link flex items-center gap-4 px-4 py-3 rounded-md transition-all hover:bg-gray-800 hover:text-white group border-l-4 border-transparent">
          <mat-icon class="group-hover:text-secondary transition-colors">{{item.icon}}</mat-icon>
          <span class="font-medium tracking-wide">{{item.label}}</span>
        </a>
      }
    </nav>
  </aside>

  <!-- Main Content Area -->
  <main class="admin-main flex-1 flex flex-col min-w-0">
    <!-- Topbar (Mobile support & breadcrumbs could go here) -->
    <header class="bg-surface border-b border-border h-16 flex items-center px-6 md:px-10 justify-between shadow-sm z-10">
      <div class="flex items-center gap-4">
        <!-- Mobile menu toggle placeholder -->
        <button class="md:hidden p-2 rounded-md hover:bg-bg-alt text-text">
          <mat-icon>menu</mat-icon>
        </button>
        <h1 class="text-xl font-display font-semibold text-text m-0">Dashboard Center</h1>
      </div>
      
      <div class="flex items-center gap-4">
        <a routerLink="/" class="text-sm font-medium hover:text-secondary transition-colors flex items-center gap-1">
          <mat-icon class="text-sm">open_in_new</mat-icon> View Store
        </a>
      </div>
    </header>

    <!-- Page Content -->
    <div class="p-6 md:p-10 flex-1 overflow-y-auto">
      <div class="max-w-7xl mx-auto w-full">
        <router-outlet></router-outlet>
      </div>
    </div>
  </main>
</div>
