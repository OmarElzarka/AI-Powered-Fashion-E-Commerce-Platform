<footer class="site-footer">
  <div class="footer-main">
    <div class="footer-container">
      <!-- Brand Column -->
      <div class="footer-brand">
        <h2 class="footer-logo">STYLÉ</h2>
        <p class="footer-tagline">AI-Powered Fashion Platform</p>
        <p class="footer-desc">
          Discover the perfect style with intelligent recommendations,
          curated collections, and AI-powered fashion assistance.
        </p>
      </div>

      <!-- Shop Links (Navigation) -->
      <div class="footer-links">
        <h3>Navigation</h3>
        <a routerLink="/shop">Shop</a>
        <a routerLink="/shop" [queryParams]="{genders: 'Women'}">Women</a>
        <a routerLink="/shop" [queryParams]="{genders: 'Men'}">Men</a>
        <a routerLink="/shop" [queryParams]="{categories: 'Accessories'}">Accessories</a>
        <a routerLink="/shop" [queryParams]="{categories: 'Footwear'}">Footwear</a>
        <a routerLink="/shop" [queryParams]="{isNewArrival: true}">New Arrivals</a>
      </div>
    </div>
  </div>

  <div class="footer-bottom">
    <div class="footer-container">
      <p>&copy; {{currentYear}} STYLÉ. All rights reserved.</p>
      <div class="footer-bottom-links">
        <a href="#">Privacy Policy</a>
        <a href="#">Terms of Service</a>
      </div>
    </div>
  </div>
</footer>
