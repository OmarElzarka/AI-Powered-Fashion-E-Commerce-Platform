<header [class.scrolled]="isScrolled" class="site-header">
  <div class="header-container">
    <!-- Logo -->
    <a routerLink="/" class="logo">
      <span class="logo-text">STYLÉ</span>
    </a>

    <!-- Navigation -->
    <nav class="main-nav">
      <a routerLink="/" routerLinkActive="active"
          [routerLinkActiveOptions]="{exact: true}">Home</a>
      <a routerLink="/shop" routerLinkActive="active">Shop</a>
      <a routerLink="/shop" [queryParams]="{genders: 'Women'}" routerLinkActive="active">Women</a>
      <a routerLink="/shop" [queryParams]="{genders: 'Men'}" routerLinkActive="active">Men</a>
      <a *appIsAdmin routerLink="/admin" routerLinkActive="active">Admin</a>
    </nav>

    <!-- Actions -->
    <div class="header-actions">
      <!-- Search Toggle -->
      <button mat-icon-button class="action-btn" (click)="toggleSearch()">
        <mat-icon>search</mat-icon>
      </button>

      <!-- Cart -->
      <a routerLink="/cart" class="action-btn cart-btn">
        <mat-icon [matBadge]="cartService.itemCount()" matBadgeSize="small"
            [matBadgeHidden]="cartService.itemCount() === 0">shopping_bag</mat-icon>
      </a>

      <!-- User -->
      @if (accountService.currentUser()) {
        <button mat-icon-button [matMenuTriggerFor]="menu" class="action-btn">
          <mat-icon>person_outline</mat-icon>
        </button>
        <mat-menu #menu="matMenu" class="user-menu">
          <div class="menu-header">
            <span class="menu-email">{{accountService.currentUser()?.firstName || accountService.currentUser()?.email}}</span>
          </div>
          <mat-divider></mat-divider>
          <button mat-menu-item routerLink="/orders">
            <mat-icon>receipt_long</mat-icon> My Orders
          </button>
          <button mat-menu-item routerLink="/cart">
            <mat-icon>shopping_bag</mat-icon> My Cart
          </button>
          <button mat-menu-item routerLink="/account/settings">
            <mat-icon>settings</mat-icon> Settings
          </button>
          <mat-divider></mat-divider>
          <button mat-menu-item (click)="logout()">
            <mat-icon>logout</mat-icon> Sign Out
          </button>
        </mat-menu>
      } @else {
        <button mat-icon-button [matMenuTriggerFor]="guestMenu" class="action-btn">
          <mat-icon>person_outline</mat-icon>
        </button>
        <mat-menu #guestMenu="matMenu" class="user-menu">
          <button mat-menu-item routerLink="/account/login">
            <mat-icon>login</mat-icon> Log In
          </button>
          <button mat-menu-item routerLink="/account/sign-up">
            <mat-icon>person_add</mat-icon> Sign Up
          </button>
        </mat-menu>
      }
    </div>
  </div>

  <!-- Search Bar -->
  @if (showSearch) {
    <div class="search-overlay" (click)="toggleSearch()">
      <div class="search-container" (click)="$event.stopPropagation()">
        <form (ngSubmit)="onSearch()">
          <mat-icon class="search-icon">search</mat-icon>
          <input type="text" placeholder="Search for products, brands, categories..."
              [(ngModel)]="searchQuery" name="search" autofocus>
          <button type="button" mat-icon-button (click)="toggleSearch()">
            <mat-icon>close</mat-icon>
          </button>
        </form>
      </div>
    </div>
  }
</header>

@if (busyService.loading) {
  <div class="progress-bar-container">
    <mat-progress-bar mode="indeterminate"></mat-progress-bar>
  </div>
}
